services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: resumeiq-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    rootDir: server
    plan: free
    envVars:
      - key: PORT
        value: 8000

  # 2. Vite React Frontend Static Site
  - type: static
    name: resumeiq-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: client
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resumeiq-backend
          type: web
          property: host
